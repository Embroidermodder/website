name: Main Script

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    - name: Get Needle
      run: |
        wget https://raw.githubusercontent.com/Embroidermodder/website/refs/heads/main/needle -O needle
        chmod +x needle
    - name: Main Task
      run: ./needle --${{ matrix.os }}
    - name: Update
      run: ./needle --update

  update-status:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    - name: Get Needle
      run: |
        wget https://raw.githubusercontent.com/Embroidermodder/website/refs/heads/main/needle -O needle
        chmod +x needle
    - name: Code Quality
      run: ./needle --code-quality
    - name: Update
      run: ./needle --update

  build-website:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Get Needle
      run: |
        wget https://raw.githubusercontent.com/Embroidermodder/website/refs/heads/main/needle -O needle
        chmod +x needle
    - name: Website
      run: ./needle --website
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build-website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

