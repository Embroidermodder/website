name: Main Script

# In order for needle to upload artifacts for us, we need to pass the github PAT.
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-test-linux:
    uses: embroidermodder/needle/.github/workflows/needle.yml@v1.2
    with:
      name: build_test_linux
      os: ubuntu-latest
      flags: --linux --update
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-test-macos:
    uses: embroidermodder/needle/.github/workflows/needle.yml@v1.1.0
    with:
      name: build_test_macos
      os: macos-latest
      flags: --macos --update
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-test-windows:
    uses: embroidermodder/needle/.github/workflows/needle.yml@v1.1.0
    with:
      name: build_test_windows
      os: windows-latest
      flags: --windows --update
      github-token: ${{ secrets.GITHUB_TOKEN }}

  code-quality:
    uses: embroidermodder/needle/.github/workflows/needle.yml@v1.1.0
    with:
      name: code_quality
      os: ubuntu-latest
      flags: --code-quality --update
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-website:
    uses: embroidermodder/needle/.github/workflows/needle.yml@v1.1.0
    with:
      name: website
      os: ubuntu-latest
      flags: --website
      github-token: ${{ secrets.GITHUB_TOKEN }}

#  upload-pages-website:
#    uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build-website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

