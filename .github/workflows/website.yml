name: Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "40 10 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  website:
    runs-on: ubuntu-latest
    name: "Build website."
    steps:
      - name: Checkout
        run: |
          git clone https://github.com/embroidermodder/libembroidery
          cd libembroidery
          bash bin/build_website.sh
          cd ..

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./libembroidery/docs/html

  deploy:
    runs-on: ubuntu-latest
    needs: website
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
