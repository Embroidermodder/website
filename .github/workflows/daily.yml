name: Daily

# Updates site and 

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_embroidermodder:
    name: "Build embroidermodder on ubuntu-latest, run tests."
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: bash build.sh
      - name: Upload
        run: |
          # These commands are where we self-modify the repository and
          # they aren't allowed in the Embroidermodder or libembroidery repositories.
          mkdir downloads
          mv build/embroider downloads
          git add downloads/embroider
          git commit -m "Updating embroider daily"
          git push origin main
