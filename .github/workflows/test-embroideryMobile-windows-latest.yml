name: test Windows

os:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

jobs:
  build-windows-latest:
    runs-on: windows-latest
    steps:
      - name: test
        run:
          git clone http://github.com/embroidermodder/embroideryMobile
          cmake embroideryMobile
          cmake --build .
          cmake --test .
